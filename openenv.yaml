name: code-review-triage
version: "1.0.0"
license: "MIT"
description: >
  An RL environment where an agent learns to triage pull request diffs.
  The agent must identify bugs, security vulnerabilities, and architectural
  problems — and produce structured reviews with severity labels and inline comments.
tags:
  - openenv
  - code-review
  - security
  - nlp
  - real-world
author: "Suhas Pranay"
tasks:
  - id: task_easy
    description: "Detect a null-pointer dereference bug in a Python greeting function"
    difficulty: easy
    grader: true
    score_range: [0.0, 1.0]
    grader_endpoint: "/tasks/task_easy/grade"
  - id: task_medium
    description: "Identify SQL injection vulnerabilities in a Flask search endpoint"
    difficulty: medium
    grader: true
    score_range: [0.0, 1.0]
    grader_endpoint: "/tasks/task_medium/grade"
  - id: task_hard
    description: "Evaluate an async batch notifier with N+1 queries, race condition, and missing error handling"
    difficulty: hard
    grader: true
    score_range: [0.0, 1.0]
    grader_endpoint: "/tasks/task_hard/grade"
  - id: task_idor
    description: "Detect insecure direct object reference (IDOR) and SQL injection in a document download endpoint"
    difficulty: medium
    grader: true
    score_range: [0.0, 1.0]
    grader_endpoint: "/tasks/task_idor/grade"
  - id: task_path_traversal
    description: "Identify path traversal vulnerability and missing authentication in file upload/preview endpoints"
    difficulty: hard
    grader: true
    score_range: [0.0, 1.0]
    grader_endpoint: "/tasks/task_path_traversal/grade"
entrypoint: server/app.py
port: 7860
